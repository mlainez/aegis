# FastAPI — local development policy.
#
# Inherits secure-defaults (universal denies for credentials, secrets,
# dangerous shell commands, cloud-metadata IPs, secret env vars).
# Declares only project-specifics on top.

inherits = "secure-defaults"
name = "fastapi_dev"
description = "Local FastAPI dev; read project tree, write under app/ and tests/."

[filesystem]
read_allow = [
    "app/**", "tests/**",
    "migrations/**", "alembic.ini",
    "pyproject.toml", "uv.lock", "poetry.lock",
    "README.md",
    "/tmp/agent_work/**",
]
write_allow = [
    "app/**", "tests/**",
    "migrations/versions/**",
    "/tmp/agent_work/**",
]
delete_allow = ["/tmp/agent_work/**"]
# Project-specific deny on top of preset's universal denies. The
# lockfiles are readable above so the agent knows what's installed,
# but never writable — dep changes go through the developer.
deny = ["pyproject.toml", "uv.lock", "poetry.lock"]

[network]
http_get_allow = [
    "api.github.com",
    "pypi.org",
    "files.pythonhosted.org",
    "fastapi.tiangolo.com",
    "docs.pydantic.dev",
    "docs.sqlalchemy.org",
]

[environment]
allow_vars = [
    "USER", "HOME", "PATH",
    "PYTHONPATH", "VIRTUAL_ENV",
    "FASTAPI_ENV",
    "DATABASE_URL_DEV",
]

[subprocess]
allow_commands = [
    "python", "python3",
    "pip", "uv", "poetry",
    "pytest", "uvicorn", "alembic",
    "ruff", "black", "mypy",
    "git",
    "cat", "ls", "head", "tail", "wc", "echo", "grep", "find",
]

[subprocess.deny_args]
git = ["push --force", "push -f", "reset --hard", "clean -fd"]
pip = ["install --user", "install --break-system-packages"]
uv = ["pip install --system"]
poetry = ["publish"]

# Capabilities are auto-derived from the populated resource sections.

# Aegis dev policy. Inherits the secure-defaults preset (universal
# denies for credentials, secrets, dangerous commands, cloud-metadata
# IPs); declares only what's specific to this project on top.
#
# See docs/AGENT_POLICY_SPEC.md for the portable schema. The format is
# usable by any agentic system, not just Aegis.

inherits = "secure-defaults"

[filesystem]
read_allow  = ["/tmp/aegis_demo/**", "examples/**", "/etc/hostname"]
write_allow = ["/tmp/aegis_demo/**"]
delete_allow = ["/tmp/aegis_demo/**"]

[network]
http_get_allow = ["api.github.com", "*.npmjs.org"]
deny_hosts = ["evil-exfil.example.com"]

[environment]
allow_vars = ["USER", "HOME", "PATH", "GITHUB_REPOSITORY"]

[subprocess]
allow_commands = ["git", "echo"]

[subprocess.deny_args]
git = ["push --force", "push -f", "reset --hard", "clean -fd"]

# Capabilities are auto-derived from the populated resource sections.

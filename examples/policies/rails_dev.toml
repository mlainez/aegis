# Ruby on Rails — local development policy.
#
# Inherits secure-defaults; declares the Rails-specific protections on
# top: secrets/master.key/credentials never readable, Gemfile.lock
# never writable, rails db:drop / bundle add / rails runner never
# runnable.

inherits = "secure-defaults"
name = "rails_dev"
description = "Local Rails dev; protects secrets, lockfile, and destructive db tasks."

[filesystem]
read_allow = [
    "app/**", "spec/**", "test/**",
    "db/migrate/**", "db/seeds.rb", "db/schema.rb",
    "config/application.rb", "config/routes.rb",
    "config/environments/development.rb",
    "config/environments/test.rb",
    "config/initializers/**",
    "config/database.yml", "config/cable.yml", "config/storage.yml",
    "config/puma.rb",
    "lib/**", "Gemfile", "Rakefile", "README.md",
    "/tmp/agent_work/**",
]
write_allow = [
    "app/**", "spec/**", "test/**",
    "db/migrate/**", "db/seeds.rb",
    "lib/tasks/**",
    "config/routes.rb", "config/initializers/**",
    "/tmp/agent_work/**",
]
delete_allow = ["/tmp/agent_work/**"]
# Rails-specific denies. Secrets in every form Rails uses, plus the
# bundler-managed lockfile and the Gemfile itself (manual gem additions
# go through the dev). The preset already covers ~/.aws, ~/.ssh,
# **/.env, **/secrets/**, etc.
deny = [
    "config/secrets.yml", "config/secrets.yml.enc",
    "config/master.key",
    "config/credentials.yml.enc",
    "config/credentials/**",
    "**/secrets.yml*", "**/master.key", "**/credentials.yml.enc",
    "**/credentials/*.key",
    "config/environments/production.rb",
    "config/environments/staging.rb",
    "Gemfile.lock",
    "Gemfile",
]

[network]
http_get_allow = [
    "api.github.com",
    "rubygems.org", "*.rubygems.org",
    "guides.rubyonrails.org", "api.rubyonrails.org", "rubydoc.info",
]

[environment]
allow_vars = ["USER", "HOME", "PATH", "RAILS_ENV", "RACK_ENV", "BUNDLE_GEMFILE", "RUBY_VERSION"]
deny_vars = [
    "RAILS_MASTER_KEY",
    "SECRET_KEY_BASE",
    "DEVISE_SECRET_KEY",
]

[subprocess]
allow_commands = [
    "ruby", "rails", "rake", "bundle", "bundler",
    "rspec", "rubocop", "standardrb", "brakeman",
    "git",
    "cat", "ls", "head", "tail", "wc", "echo", "grep", "find",
]

[subprocess.deny_args]
git = ["push --force", "push -f", "reset --hard", "clean -fd"]
rails = [
    "db:drop", "db:reset", "db:migrate:redo",
    "credentials:edit", "secrets:edit",
    "runner",
    "console --sandbox=false",
    "destroy",
    "assets:clobber",
]
rake = ["db:drop", "db:reset", "db:migrate:reset"]
bundle = [
    "add",
    "remove",
    "update",
    "install --redownload",
    "exec rails db:drop",
    "exec rake db:drop",
]

# Capabilities are auto-derived from the populated resource sections.
